<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Generator</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f7fa">
  
  <style>
    /* ... your existing styles ... */
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f7fa; color: #333; }
    h1 { margin-bottom: 0.5rem; }
    textarea { width: 100%; height: 150px; margin-bottom: 1rem; padding: 0.5rem; font-size: 1rem; }
    input, button { padding: 0.5rem; font-size: 1rem; margin-right: 0.5rem; }
    button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background: #0056b3; }
    .teams { margin-top: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .team { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .team h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  </style>
</head>
<body>

<h1>Team Generator</h1>
<p>Paste student names (one per line), choose number of teams, and generate.</p>

<textarea id="names" placeholder="Enter one student name per line..."></textarea>

<div>
  <label for="teamCount">Number of teams:</label>
  <input type="number" id="teamCount" min="1" value="2">
  <button onclick="generateTeams()">Generate Teams</button>
</div>

<div id="output" class="teams"></div>

<script>
// --- Your Existing Logic ---
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function generateTeams() {
  const raw = document.getElementById("names").value.trim();
  const teamCount = parseInt(document.getElementById("teamCount").value, 10);
  const output = document.getElementById("output");
  output.innerHTML = "";

  if (!raw) { alert("Please enter at least one name."); return; }
  if (teamCount < 1) { alert("Number of teams must be at least 1."); return; }

  const names = raw.split("\n").map(n => n.trim()).filter(n => n.length > 0);
  shuffle(names);

  const teams = Array.from({ length: teamCount }, () => []);
  names.forEach((name, index) => {
    teams[index % teamCount].push(name);
  });

  teams.forEach((team, i) => {
    const div = document.createElement("div");
    div.className = "team";
    const title = document.createElement("h3");
    title.textContent = `Team ${i + 1}`;
    div.appendChild(title);
    const list = document.createElement("ul");
    team.forEach(member => {
      const li = document.createElement("li");
      li.textContent = member;
      list.appendChild(li);
    });
    div.appendChild(list);
    output.appendChild(div);
  });
}

// --- PWA Service Worker Registration ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log("Service Worker Registered!", reg.scope))
      .catch(err => console.log("Service Worker registration failed:", err));
  });
}
</script>

</body>
</html>
